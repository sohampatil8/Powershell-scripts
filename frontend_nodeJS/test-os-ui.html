<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OS-Based Device Scanner - Test Interface</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        min-height: 100vh;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        background: white;
        border-radius: 15px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        font-size: 2em;
        margin-bottom: 10px;
      }

      .header p {
        opacity: 0.9;
      }

      .content {
        padding: 30px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
      }

      .button-group {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-top: 30px;
      }

      button {
        padding: 15px 25px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        color: white;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .btn-test {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .btn-hardware {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }

      .btn-software {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      }

      .btn-clear {
        background: #6c757d;
      }

      .result-box {
        margin-top: 30px;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 8px;
        border-left: 4px solid #667eea;
        display: none;
      }

      .result-box.show {
        display: block;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-box h3 {
        margin-bottom: 15px;
        color: #333;
      }

      .result-content {
        background: white;
        padding: 15px;
        border-radius: 5px;
        max-height: 500px;
        overflow-y: auto;
      }

      pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 12px;
        line-height: 1.6;
      }

      .status-badge {
        display: inline-block;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .status-success {
        background: #d4edda;
        color: #155724;
      }

      .status-error {
        background: #f8d7da;
        color: #721c24;
      }

      .status-loading {
        background: #fff3cd;
        color: #856404;
      }

      .loader {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 10px;
        vertical-align: middle;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🔍 OS-Based Device Scanner</h1>
        <p>Automatic OS Detection & Script Selection</p>
      </div>

      <div class="content">
        <form id="scanForm">
          <div class="form-group">
            <label for="ip">Target IP Address</label>
            <input type="text" id="ip" placeholder="192.168.1.100" required />
          </div>

          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              placeholder="Administrator"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter password"
              required
            />
          </div>

          <div class="button-group">
            <button type="button" class="btn-test" onclick="testConnection()">
              🔌 Test Connection
            </button>
            <button
              type="button"
              class="btn-hardware"
              onclick="getHardwareInfo()"
            >
              🖥️ Get Hardware Info
            </button>
            <button
              type="button"
              class="btn-software"
              onclick="getSoftwareInfo()"
            >
              📦 Get Software Info
            </button>
            <button type="button" class="btn-clear" onclick="clearResults()">
              🗑️ Clear Results
            </button>
          </div>
        </form>

        <div id="resultBox" class="result-box">
          <h3 id="resultTitle">Results</h3>
          <div class="result-content">
            <pre id="resultContent"></pre>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:1000/api";

      function getFormData() {
        return {
          ip: document.getElementById("ip").value.trim(),
          username: document.getElementById("username").value.trim(),
          password: document.getElementById("password").value,
        };
      }

      function showResult(title, content, status = "success") {
        const resultBox = document.getElementById("resultBox");
        const resultTitle = document.getElementById("resultTitle");
        const resultContent = document.getElementById("resultContent");

        let badge = "";
        if (status === "loading") {
          badge =
            '<span class="status-badge status-loading"><span class="loader"></span>Processing...</span>';
        } else if (status === "success") {
          badge = '<span class="status-badge status-success">✅ Success</span>';
        } else if (status === "error") {
          badge = '<span class="status-badge status-error">❌ Error</span>';
        }

        resultTitle.innerHTML = badge + " " + title;
        resultContent.textContent =
          typeof content === "object"
            ? JSON.stringify(content, null, 2)
            : content;

        resultBox.classList.add("show");
        resultBox.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      function clearResults() {
        document.getElementById("resultBox").classList.remove("show");
      }

      async function testConnection() {
        const data = getFormData();

        if (!data.ip || !data.username || !data.password) {
          alert("Please fill in all fields");
          return;
        }

        showResult(
          "Testing Connection",
          "Connecting to " + data.ip + "...",
          "loading",
        );

        try {
          const response = await fetch(`${API_BASE}/test-connection`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const result = await response.json();

          if (result.success) {
            showResult(
              "Connection Test",
              {
                status: "Connection Successful",
                ip: data.ip,
                detectedOS: result.os,
                scriptType: result.os.toLowerCase().includes("windows 7")
                  ? "Windows 7 (WMI - Get-WmiObject)"
                  : "Modern Windows (CIM - Get-CimInstance)",
              },
              "success",
            );
          } else {
            showResult(
              "Connection Test",
              {
                status: "Connection Failed",
                error: result.error,
              },
              "error",
            );
          }
        } catch (error) {
          showResult(
            "Connection Test",
            {
              status: "Request Failed",
              error: error.message,
            },
            "error",
          );
        }
      }

      async function getHardwareInfo() {
        const data = getFormData();

        if (!data.ip || !data.username || !data.password) {
          alert("Please fill in all fields");
          return;
        }

        showResult(
          "Hardware Information",
          "Extracting hardware information...",
          "loading",
        );

        try {
          const response = await fetch(`${API_BASE}/device-info/single`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const result = await response.json();

          if (result.status === "success") {
            // Create a summary view
            const summary = {
              hostname: result.parsed.hostname,
              os: result.parsed.os,
              osDetected: result.parsed.os_detection,
              scriptUsed: result.parsed.script_used,
              manufacturer: result.parsed.manufacturer,
              model: result.parsed.model,
              cpu: result.parsed.cpu,
              memory: result.parsed.memory.total,
              cores: result.parsed.cpu_cores,
              architecture: result.parsed.architecture,
              ipAddresses: result.parsed.ip_addresses,
              macAddresses: result.parsed.mac_addresses,
              fullData: result,
            };

            showResult("Hardware Information", summary, "success");
          } else {
            showResult(
              "Hardware Information",
              {
                status: "Extraction Failed",
                error: result.error,
              },
              "error",
            );
          }
        } catch (error) {
          showResult(
            "Hardware Information",
            {
              status: "Request Failed",
              error: error.message,
            },
            "error",
          );
        }
      }

      async function getSoftwareInfo() {
        const data = getFormData();

        if (!data.ip || !data.username || !data.password) {
          alert("Please fill in all fields");
          return;
        }

        showResult(
          "Software Information",
          "Extracting software information...",
          "loading",
        );

        try {
          const response = await fetch(`${API_BASE}/software-info`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const result = await response.json();

          if (result.status === "success") {
            const summary = {
              hostname: result.hostname,
              os: result.os,
              osDetected: result.os_detection,
              scriptUsed: result.script_used,
              totalSoftware: result.software_count,
              top10Software: result.software?.slice(0, 10).map((s) => ({
                name: s.Name,
                version: s.Version,
                publisher: s.Publisher,
              })),
              fullData: result,
            };

            showResult("Software Information", summary, "success");
          } else {
            showResult(
              "Software Information",
              {
                status: "Extraction Failed",
                error: result.error,
              },
              "error",
            );
          }
        } catch (error) {
          showResult(
            "Software Information",
            {
              status: "Request Failed",
              error: error.message,
            },
            "error",
          );
        }
      }
    </script>
  </body>
</html>
